name: iOS · Build & TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "native/**"
      - ".github/workflows/ios-testflight.yml"

concurrency:
  group: ios-build
  cancel-in-progress: true

jobs:
  # Compiles against the simulator SDK — no signing, no Apple account needed.
  # This is the fast feedback loop that proves the Swift is sound.
  compile:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: native
        run: xcodegen generate

      - name: Build (unsigned, simulator)
        run: |
          xcodebuild build \
            -project native/FirstWord.xcodeproj \
            -scheme FirstWord \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO | xcbeautify --renderer github-actions || \
          xcodebuild build \
            -project native/FirstWord.xcodeproj \
            -scheme FirstWord \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  # Signs + uploads to TestFlight. Skips itself until the four secrets exist.
  build:
    runs-on: macos-26
    needs: compile
    if: ${{ vars.PIPELINE_ARMED == 'true' }}
    timeout-minutes: 45
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: native
        run: xcodegen generate

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_KEY_P8 }}" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Inject team ID into export options
        run: sed -i '' "s/TEAM_ID_PLACEHOLDER/${APPLE_TEAM_ID}/" native/ExportOptions.plist

      - name: Archive (cloud signing)
        run: |
          xcodebuild archive \
            -project native/FirstWord.xcodeproj \
            -scheme FirstWord \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/FirstWord.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}"

      - name: Export & upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath build/FirstWord.xcarchive \
            -exportOptionsPlist native/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "${ASC_KEY_ID}" \
            -authenticationKeyIssuerID "${ASC_ISSUER_ID}"
